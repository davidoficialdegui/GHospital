<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Médico</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
<div class="contenedor-ancho">
    <h1>Editar Médico</h1>

    <div th:if="${mensaje}"
         style="background:#d1e7dd; color:#0f5132; padding:12px; border-radius:6px; margin-bottom:15px;">
        <span th:text="${mensaje}"></span>
    </div>
    <div th:if="${error}"
         style="background:#f8d7da; color:#842029; padding:12px; border-radius:6px; margin-bottom:15px;">
        <strong>Error:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/admin/editar/medico/{id}(id=${medico.id})}" method="post">

        <label>Nombre</label>
        <input type="text" name="nombre" th:value="${medico.nombre}" required>

        <label>Primer apellido</label>
        <input type="text" name="apellido1" th:value="${medico.apellido1}" required>

        <label>Segundo apellido</label>
        <input type="text" name="apellido2" th:value="${medico.apellido2}">

        <label>DNI</label>
        <input type="text" name="dni" th:value="${medico.dni}" required>

        <label>Email</label>
        <input type="email" name="email" th:value="${medico.email}">

        <label>Teléfono</label>
        <input type="text" name="telefono" th:value="${medico.telefono}">

        <label>Fecha de nacimiento</label>
        <input type="date" name="fechaNacimiento" th:value="${medico.fechaNacimiento}">

        <label>Sexo</label>
        <input type="text" name="sexo" th:value="${medico.sexo}">

        <label>Dirección</label>
        <input type="text" name="direccion" th:value="${medico.direccion}">

        <label>Ciudad</label>
        <input type="text" name="ciudad" th:value="${medico.ciudad}">

        <label>Provincia</label>
        <input type="text" name="provincia" th:value="${medico.provincia}">

        <label>Código postal</label>
        <input type="text" name="codigoPostal" th:value="${medico.codigoPostal}">

        <label>Especialidad</label>
        <input type="text" name="especialidad" th:value="${medico.especialidad}" required>

        <label>Subespecialidad</label>
        <input type="text" name="subespecialidad" th:value="${medico.subespecialidad}">

        <label>Departamento</label>
        <input type="text" name="departamento" th:value="${medico.departamento}">

        <label>Años de experiencia</label>
        <input type="number" name="aniosExperiencia" th:value="${medico.aniosExperiencia}">

        <label>Turno</label>
        <input type="text" name="turno" th:value="${medico.turno}" placeholder="MAÑANA, TARDE, NOCHE, ROTATIVO">

        <label>Descripción profesional</label>
        <input type="text" name="descripcionProfesional" th:value="${medico.descripcionProfesional}">

        <button type="submit">Guardar cambios</button>
    </form>

    <a href="/admin/usuarios">Volver a la lista</a>
</div>
</body>
</html>
