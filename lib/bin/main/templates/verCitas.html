<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Citas</title>
</head>
<body>

<h1>Mis citas</h1>

<table border="1">
    <tr>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Especialidad</th>
        <th>Médico</th>
        <th>Motivo</th>
    </tr>

    <tr th:each="cita : ${citas}">
        <td th:text="${cita.fechaHora}"></td>
        <td th:text="${cita.estado}"></td>
        <td th:text="${cita.especialidad}"></td>
        <td th:text="${cita.medicoNombre}"></td>
        <td th:text="${cita.motivo}"></td>
    </tr>

</table>

</body>
</html>
