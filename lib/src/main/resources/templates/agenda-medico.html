<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda del Médico</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <div class="contenedor-ancho">
        <h1>Mi Agenda</h1>

        <div th:if="${citas != null}">

            <div class="resumen">
                <div class="resumen-item">
                    <div class="numero" th:text="${citas.size()}">0</div>
                    <div class="etiqueta">Total citas</div>
                </div>
                <div class="resumen-item">
                    <div class="numero" th:text="${#lists.size(citas.?[estado == 'CONFIRMADA'])}">0</div>
                    <div class="etiqueta">Confirmadas</div>
                </div>
                <div class="resumen-item">
                    <div class="numero" th:text="${#lists.size(citas.?[estado == 'PENDIENTE'])}">0</div>
                    <div class="etiqueta">Pendientes</div>
                </div>
            </div>

            <table th:if="${!citas.isEmpty()}">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Paciente</th>
                        <th>Especialidad</th>
                        <th>Motivo</th>
                        <th>Estado</th>
                        <th>Historial paciente</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cita : ${citas}">
                        <td th:text="${#temporals.format(cita.fechaHora, 'dd/MM/yyyy')}">--/--/----</td>
                        <td th:text="${#temporals.format(cita.fechaHora, 'HH:mm')}">--:--</td>
                        <td th:text="${cita.pacienteNombre != null ? cita.pacienteNombre : '-'}">-</td>
                        <td th:text="${cita.especialidad != null ? cita.especialidad : '-'}">-</td>
                        <td th:text="${cita.motivo != null ? cita.motivo : '-'}">-</td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${cita.estado}"
                                  th:text="${cita.estado}">ESTADO</span>
                        </td>
                        <td>
                            <a th:href="@{/medico/historial(pacienteId=${cita.pacienteId})}"
                               style="font-size:13px; color:#007bff;">Ver historial</a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <p class="sin-citas" th:if="${citas.isEmpty()}">
                No tienes citas registradas.
            </p>

        </div>

        <a href="/login">Volver al login</a>
    </div>
</body>
</html>
