<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Citas</title>
    <link rel="stylesheet" href="/css/estilos.css">
    <style>
        .contenedor-citas {
            width: 960px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.12);
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header-row h1 { margin: 0; }
        .btn-crear {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 22px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-crear:hover { background: #0056b3; }
        .alerta-ok {
            background: #d1e7dd; color: #0f5132;
            padding: 12px; border-radius: 6px; margin-bottom: 15px;
        }
        .alerta-error {
            background: #f8d7da; color: #842029;
            padding: 12px; border-radius: 6px; margin-bottom: 15px;
        }
        .estado-form { display: flex; align-items: center; gap: 6px; margin: 0; }
        .estado-select {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-guardar {
            width: auto;
            margin-top: 0;
            padding: 4px 10px;
            font-size: 12px;
            background: #28a745;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .btn-guardar:hover { background: #1e7e34; }
        .acciones-bottom {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .link-volver {
            color: #6c757d;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin-top: 0;
        }
        .link-volver:hover { text-decoration: underline; }
        td form { margin: 0; }
    </style>
</head>
<body>
<div class="contenedor-citas">

    <div class="header-row">
        <h1>Gestor de citas</h1>
        <a href="/citas/crear" class="btn-crear">+ Nueva cita</a>
    </div>

    <!-- Alertas -->
    <div th:if="${mensaje}" class="alerta-ok">
        <span th:text="${mensaje}"></span>
    </div>
    <div th:if="${error}" class="alerta-error">
        <strong>Error:</strong> <span th:text="${error}"></span>
    </div>

    <!-- Resumen -->
    <div th:if="${citas != null and !citas.empty}" class="resumen">
        <div class="resumen-item">
            <div class="numero" th:text="${citas.size()}">0</div>
            <div class="etiqueta">Total</div>
        </div>
        <div class="resumen-item">
            <div class="numero" style="color:#856404;"
                 th:text="${#lists.size(citas.?[estado == 'PENDIENTE'])}">0</div>
            <div class="etiqueta">Pendientes</div>
        </div>
        <div class="resumen-item">
            <div class="numero" style="color:#0f5132;"
                 th:text="${#lists.size(citas.?[estado == 'CONFIRMADA'])}">0</div>
            <div class="etiqueta">Confirmadas</div>
        </div>
        <div class="resumen-item">
            <div class="numero" style="color:#842029;"
                 th:text="${#lists.size(citas.?[estado == 'CANCELADA'])}">0</div>
            <div class="etiqueta">Canceladas</div>
        </div>
        <div class="resumen-item">
            <div class="numero" style="color:#084298;"
                 th:text="${#lists.size(citas.?[estado == 'REALIZADA'])}">0</div>
            <div class="etiqueta">Realizadas</div>
        </div>
    </div>

    <!-- Tabla de citas -->
    <table th:if="${citas != null and !citas.empty}">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Motivo</th>
                <th>Estado actual</th>
                <th>Cambiar estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cita : ${citas}">
                <td th:text="${#temporals.format(cita.fechaHora, 'dd/MM/yyyy')}">-</td>
                <td th:text="${#temporals.format(cita.fechaHora, 'HH:mm')}">-</td>
                <td th:text="${cita.medicoNombre}">-</td>
                <td th:text="${cita.especialidad != null ? cita.especialidad : '-'}">-</td>
                <td th:text="${cita.motivo != null ? cita.motivo : '-'}">-</td>
                <td>
                    <span class="badge"
                          th:classappend="'badge-' + ${cita.estado}"
                          th:text="${cita.estado}">-</span>
                </td>
                <td>
                    <form th:action="@{/citas/{id}/estado(id=${cita.id})}"
                          method="post"
                          class="estado-form">
                        <select name="nuevoEstado" class="estado-select">
                            <option value="PENDIENTE"  th:selected="${cita.estado == 'PENDIENTE'}">Pendiente</option>
                            <option value="CONFIRMADA" th:selected="${cita.estado == 'CONFIRMADA'}">Confirmada</option>
                            <option value="REALIZADA"  th:selected="${cita.estado == 'REALIZADA'}">Realizada</option>
                            <option value="CANCELADA"  th:selected="${cita.estado == 'CANCELADA'}">Cancelada</option>
                        </select>
                        <button type="submit" class="btn-guardar">Guardar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <p class="sin-citas" th:if="${citas == null or citas.empty}">
        No hay citas registradas aún.
    </p>

    <div class="acciones-bottom">
        <a href="/login" class="link-volver">← Volver al login</a>
    </div>

</div>
</body>
</html>
