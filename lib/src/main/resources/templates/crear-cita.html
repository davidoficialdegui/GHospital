<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Cita</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <div class="contenedor">
        <h1>Solicitar cita médica</h1>

        <div th:if="${error}"
             style="background:#f8d7da; color:#842029; padding:12px; border-radius:6px; margin-bottom:15px;">
            <strong>Error:</strong> <span th:text="${error}"></span>
        </div>

        <p style="background:#e8f4fd; padding:10px; border-radius:6px;">
            <strong>Datos disponibles:</strong><br>
            Paciente ID: 1 (Ana Martínez) o 2 (Pedro López)<br>
            Médico ID: 1 (Carlos García - Cardiología) o 2 (Laura Sánchez - Pediatría)
        </p>

        <form action="/citas/crear" method="post">
            <label for="pacienteId">Paciente ID</label>
            <input type="number" id="pacienteId" name="pacienteId" value="1" required>

            <label for="medicoId">Médico ID</label>
            <input type="number" id="medicoId" name="medicoId" value="1" required>

            <label for="fechaHora">Fecha y hora</label>
            <input type="datetime-local" id="fechaHora" name="fechaHora" required>

            <label for="especialidad">Especialidad</label>
            <input type="text" id="especialidad" name="especialidad">

            <label for="motivo">Motivo</label>
            <input type="text" id="motivo" name="motivo">

            <button type="submit">Crear cita</button>
        </form>

        <a href="/login">Volver al inicio</a>
    </div>
</body>
</html>
